name: rd-decay-with-viz
description: "VCell FV reaction-diffusion decay demo with a wired Visualization Step. Each update produces a Plotly HTML figure of the per-species mean and total concentration trajectories, written to the 'viz_html' store."

requires:
  processes: [VCellFVProcess, RDFieldPlots, RAMEmitter]

parameters:
  duration:
    type: float
    default: 1.0
    description: "Total simulated time in seconds."
  output_time_step:
    type: float
    default: 0.25
    description: "Snapshot cadence written by the solver."
  interval:
    type: float
    default: 0.25
    description: "PBG update interval between snapshots."
  viz_title:
    type: string
    default: "VCell FV reaction-diffusion"
    description: "Title displayed at the top of the Plotly figure."

state:
  rd:
    _type: process
    address: "local:VCellFVProcess"
    config:
      antimony: |
        compartment ec;
        compartment cell;
        species A in cell;
        species B in cell;
        A -> B; k*A
        k = 0.3
        A = 0
        B = 0
      compartment: "cell"
      extent_x: 4.0
      extent_y: 4.0
      extent_z: 4.0
      mesh_x: 5
      mesh_y: 5
      mesh_z: 5
      duration: "${duration}"
      output_time_step: "${output_time_step}"
      init_concs:
        A: "10.0"
        B: "0.0"
      diff_coefs:
        A: 0.0
        B: 0.0
      track_species: ["A", "B"]
      quiet: true
    inputs: {}
    outputs:
      fields: ["stores", "fields"]
      means: ["stores", "means"]
      totals: ["stores", "totals"]
      time: ["stores", "last_time"]
      num_snapshots: ["stores", "num_snapshots"]
      snapshot_index: ["stores", "snapshot_index"]
    interval: "${interval}"
  stores:
    fields: {}
    means: {}
    totals: {}
    last_time: 0.0
    num_snapshots: 0
    snapshot_index: 0
    viz_html: ""
  viz:
    _type: step
    address: "local:RDFieldPlots"
    config:
      title: "${viz_title}"
    inputs:
      means: ["stores", "means"]
      totals: ["stores", "totals"]
      time: ["global_time"]
    outputs:
      html: ["stores", "viz_html"]
  emitter:
    _type: step
    address: "local:ram-emitter"
    config:
      emit:
        time: "float"
        num_snapshots: "integer"
        snapshot_index: "integer"
        means: "map[float]"
        totals: "map[float]"
    inputs:
      time: ["global_time"]
      num_snapshots: ["stores", "num_snapshots"]
      snapshot_index: ["stores", "snapshot_index"]
      means: ["stores", "means"]
      totals: ["stores", "totals"]
