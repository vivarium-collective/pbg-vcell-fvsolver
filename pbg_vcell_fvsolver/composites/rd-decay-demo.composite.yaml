name: rd-decay-demo
description: "Tiny VCell FV reaction-diffusion demo: a uniform pool of species A decays to species B (A -> B; k*A) on a small 3D Cartesian mesh. No diffusion. Emits per-snapshot mean/total concentration plus time-axis bookkeeping."

requires:
  processes: [VCellFVProcess, RAMEmitter]

parameters:
  duration:
    type: float
    default: 1.0
    description: "Total simulated time in seconds. The wrapper pre-runs the full PDE solve and then streams snapshots through update()."
  output_time_step:
    type: float
    default: 0.25
    description: "Snapshot cadence written by the solver."
  interval:
    type: float
    default: 0.25
    description: "PBG update interval between snapshots. Match output_time_step to advance one snapshot per step."
  init_A:
    type: string
    default: "10.0"
    description: "Initial concentration of species A (Antimony-style scalar or spatial expression in x,y,z)."

state:
  rd:
    _type: process
    address: "local:VCellFVProcess"
    config:
      antimony: |
        compartment ec;
        compartment cell;
        species A in cell;
        species B in cell;
        A -> B; k*A
        k = 0.3
        A = 0
        B = 0
      compartment: "cell"
      extent_x: 4.0
      extent_y: 4.0
      extent_z: 4.0
      mesh_x: 5
      mesh_y: 5
      mesh_z: 5
      duration: "${duration}"
      output_time_step: "${output_time_step}"
      init_concs:
        A: "${init_A}"
        B: "0.0"
      diff_coefs:
        A: 0.0
        B: 0.0
      track_species: ["A", "B"]
      quiet: true
    inputs: {}
    outputs:
      fields: ["stores", "fields"]
      means: ["stores", "means"]
      totals: ["stores", "totals"]
      time: ["stores", "last_time"]
      num_snapshots: ["stores", "num_snapshots"]
      snapshot_index: ["stores", "snapshot_index"]
    interval: "${interval}"
  stores:
    fields: {}
    means: {}
    totals: {}
    last_time: 0.0
    num_snapshots: 0
    snapshot_index: 0
  emitter:
    _type: step
    address: "local:ram-emitter"
    config:
      emit:
        time: "float"
        num_snapshots: "integer"
        snapshot_index: "integer"
        means: "map[float]"
        totals: "map[float]"
    inputs:
      time: ["global_time"]
      num_snapshots: ["stores", "num_snapshots"]
      snapshot_index: ["stores", "snapshot_index"]
      means: ["stores", "means"]
      totals: ["stores", "totals"]
